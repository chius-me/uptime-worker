name = "uptime-worker"
main = "src/index.ts"
compatibility_date = "2025-04-02"
compatibility_flags = ["nodejs_compat"]

# Workers Static Assets — 代替 Cloudflare Pages
assets = { directory = "./static", binding = "ASSETS" }

# 用 D1 存监控状态
[[d1_databases]]
binding = "UPTIME_WORKER_D1"
database_name = "uptime_worker_d1"
database_id = "97bbb9eb-3d04-4d5e-b66f-918483619a0c"

# 多地探测用的 Durable Objects
[[durable_objects.bindings]]
name = "REMOTE_CHECKER_DO"
class_name = "RemoteChecker"

[[migrations]]
tag = "v1"
new_sqlite_classes = ["RemoteChecker"]

# 每分钟跑一次监控
[triggers]
crons = ["* * * * *"]
